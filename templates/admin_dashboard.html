<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="main-content">

        <h2>Admin Dashboard</h2>

        <button id="logoutBtn">Logout</button>

        <button id="loadCropsBtn">View Crop Database</button>
        <button id="loadSamplesBtn">View Soil Samples</button>

        <hr style="margin:20px 0;">

        <!-- Crop Database Section -->
        <div id="cropDataContainer" style="display:none;">
            <h3>Crop Database</h3>

            <table id="cropTable">
                <thead>
                    <tr>
                        <th>Crop Name</th>
                        <th>pH Range</th>
                        <th>N Range</th>
                        <th>P Range</th>
                        <th>K Range</th>
                        <th>Rainfall Range</th>
                    </tr>
                </thead>

                <tbody id="cropTableBody">
                </tbody>
            </table>
        </div>

        <!-- Soil Samples Section -->
        <div id="sampleData" style="display:none;">
            <h3>All Soil Samples</h3>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
