<!DOCTYPE html>
<html>
<head>
  <title>Farmer Dashboard</title>
  <link rel="stylesheet" href="assets/css/dashboard.css">
</head>
<body>
  <h2>Submit Soil Sample</h2>

  <!-- This form now has an ID and will be handled by main.js -->
  <form id="soilForm">
    <fieldset>
      <legend>Farmer Info</legend>
      Name: <input name="name" required><br>
      Location: <input name="location" required><br>
      Contact Type: 
      <select name="contact_type">
        <option value="phone">Phone</option>
        <option value="email">Email</option>
      </select><br>
      Contact Value: <input name="contact_value" required><br>
    </fieldset>

    <fieldset>
      <legend>Soil Sample</legend>
      Sample Date: <input type="date" name="sample_date" required><br>
      Sample Location: <input name="sample_location" required><br>
      Remarks: <textarea name="remarks"></textarea><br>
    </fieldset>

    <button type="submit">Send to Technician</button>
  </form>

  <!-- This now points to the single, correct script -->
  <script src="assets/js/main.js"></script>
</body>
</html>
